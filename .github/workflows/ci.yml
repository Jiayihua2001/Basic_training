name: Build and deploy docs

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

# Permissions needed for GitHub Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, but don't cancel an in-flight one.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'        # match the conda env from setup_dev.sh
          working-directory: docs    # Gemfile lives here
          bundler-cache: true        # bundle install + cache gems
          cache-version: 0

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        working-directory: docs
        # Pass --baseurl so it reflects what configure-pages computed for this repo.
        # _config.yml's baseurl is the local default (/Basic_training); CI overrides it
        # to whatever GitHub Pages reports, so forks / renames keep working.
        run: |
          bundle exec jekyll build \
            --destination _site \
            --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        # Uploads only on push to main (deployment only happens then).
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_site

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
